name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish
        run: dotnet publish OmniCard/OmniCard.csproj -c Release -r win-x64 /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Rename artifact
        shell: bash
        run: mv OmniCard/bin/Release/net10.0-windows10.0.22621.0/win-x64/publish/OmniCard.exe "OmniCard-v${{ steps.version.outputs.VERSION }}-win-x64.exe"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.event.release.tag_name }} "OmniCard-v${{ steps.version.outputs.VERSION }}-win-x64.exe"
